<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abre em poucos dias — Virtap</title>
  <meta name="description"
    content="As inscrições do programa abrem nos próximos dias. Entre na lista pra ser avisada assim que abrir.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --roxo: #5B2D8E;
      --roxo-escuro: #3d1d61;
      --azul: #B3E3E5;
      --azul-claro: #eaf8f8;
      --texto: #2a2336;
      --texto-suave: #6b6478;
      --branco: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--texto);
      background:
        radial-gradient(120% 90% at 15% 0%, var(--azul-claro) 0%, transparent 55%),
        radial-gradient(110% 80% at 100% 100%, #f3eefb 0%, transparent 50%),
        var(--branco);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .cartao {
      width: 100%;
      max-width: 480px;
      background: var(--branco);
      border: 1px solid #efeaf6;
      border-radius: 28px;
      padding: 44px 34px 36px;
      box-shadow: 0 30px 60px -28px rgba(91, 45, 142, .28);
      text-align: center;
      position: relative;
    }

    .marca {
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: 13px;
      color: var(--roxo);
      margin-bottom: 28px;
    }

    .marca span {
      color: var(--azul);
      -webkit-text-stroke: .4px #7fc9cc;
    }

    .selo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--azul-claro);
      color: var(--roxo);
      font-weight: 600;
      font-size: 13.5px;
      padding: 8px 16px;
      border-radius: 999px;
      margin-bottom: 26px;
    }

    .pontos {
      display: inline-flex;
      gap: 4px;
    }

    .pontos i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--roxo);
      display: block;
      animation: pulsa 1.4s infinite ease-in-out;
    }

    .pontos i:nth-child(2) {
      animation-delay: .2s;
    }

    .pontos i:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes pulsa {

      0%,
      100% {
        opacity: .25;
        transform: translateY(0);
      }

      50% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 32px;
      line-height: 1.15;
      color: var(--roxo-escuro);
      margin-bottom: 16px;
      letter-spacing: -.01em;
    }

    .sub {
      color: var(--texto-suave);
      font-size: 16.5px;
      margin-bottom: 14px;
    }

    .sub strong {
      color: var(--texto);
      font-weight: 600;
    }

    .reforco {
      color: var(--texto);
      font-size: 16px;
      margin-bottom: 30px;
    }

    .botao {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 100%;
      background: var(--roxo);
      color: var(--branco);
      text-decoration: none;
      font-weight: 700;
      font-size: 16.5px;
      padding: 17px 20px;
      border-radius: 16px;
      transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: 0 14px 26px -12px rgba(91, 45, 142, .6);
    }

    .botao:hover {
      background: var(--roxo-escuro);
      transform: translateY(-2px);
    }

    .botao:active {
      transform: translateY(0);
    }

    .botao:focus-visible {
      outline: 3px solid var(--azul);
      outline-offset: 3px;
    }

    .botao svg {
      flex-shrink: 0;
    }

    .nota {
      margin-top: 16px;
      font-size: 13.5px;
      color: var(--texto-suave);
    }

    .rodape {
      margin-top: 30px;
      padding-top: 22px;
      border-top: 1px solid #f1ecf7;
      font-size: 13px;
      color: var(--texto-suave);
    }

    @media (max-width:420px) {
      .cartao {
        padding: 38px 24px 30px;
        border-radius: 24px;
      }

      h1 {
        font-size: 27px;
      }
    }

    @media (prefers-reduced-motion:reduce) {
      .pontos i {
        animation: none;
        opacity: .7;
      }

      .botao {
        transition: none;
      }
    }
  </style>

</head>
