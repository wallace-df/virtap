<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">

    <link href="/favicon.svg" type="image/svg+xml" rel="icon" />
    <link href="/favicon.png" type="image/png" rel="icon" />

    <title>Descubra seu caminho na profissão de Assistente Virtual | Virtap</title>
    <link rel="stylesheet" href="/css/quiz-v2.css" />
    <link rel="stylesheet" href="/css/intlTelInput.min.css" />

    <!-- Google Tag Manager -->
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-N6VNPLTX');

    <!-- End Google Tag Manager -->

    <script>
        window.apiURL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://api.virtap.com.br';
    </script>
</head>

<body>

    <h1>Qual o próximo passo pra você como Assistente Virtual? ⭐
    <p>Responda algumas perguntas rápidas e veja como avançar na sua carreira.</p>
    </h1>

    <div id="quiz-wrapper">
        <div id="quiz-container">
            <div class="header-nav" style="display:none" id="header-nav">
                <div id="back-btn" class="back-link" onclick="goBack()">← Voltar</div>
            </div>
            <div id="step-content" class="step active">
                <!-- Conteúdo populado dinamicamente pelo JS conforme o step atual -->
            </div>
        </div>
    </div>

    <!-- Error modal pra falhas no envio do form de captura -->
    <div id="error-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeErrorModal()">×</span>
            <h3>Ops! Algo deu errado 😕</h3>
            <p>Não foi possível enviar seus dados. Por favor, tente novamente em instantes.</p>
            <button onclick="closeErrorModal()">Fechar</button>
        </div>
    </div>

    <script src="/js/intlTelInput.min.js"></script>
    <script src="/js/quiz-v4.js"></script>
</body>

</html>
