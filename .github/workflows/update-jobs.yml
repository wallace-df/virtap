name: Atualizar vagas automaticamente

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  atualizar-vagas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Atualizar vagas
        run: |
          python3 scripts/atualizar_vagas.py formacoes/assistencia-virtual/index2.html

      - name: Verificar alterações
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add formacoes/assistencia-virtual/index2.html
          git pull --rebase
          git commit -m "Atualiza vagas automaticamente"
          git push
