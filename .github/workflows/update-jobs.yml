name: Atualizar vagas automaticamente

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  atualizar-vagas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # baixa todo o histórico para permitir rebase com segurança

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Atualizar vagas
        run: |
          python3 scripts/update_jobs.py

      - name: Verificar alterações
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Adiciona e cria o commit local
          git add formacoes/assistencia-virtual/index2.html
          git commit -m "Atualiza vagas automaticamente"

          # Busca mudanças remotas e reaplica este commit no topo
          git pull --rebase origin main

          # Envia para a branch principal
          git push origin HEAD:main
