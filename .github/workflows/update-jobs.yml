name: Atualizar vagas automaticamente
on:
  schedule:
    - cron: '17 8,12,17,22 * * *'
  workflow_dispatch:

jobs:
  atualizar-vagas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Atualizar vagas
        run: python3 scripts/update_jobs.py

      - name: Verificar alterações
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vagas-assistente-virtual/index.html \
                  vagas-assistente-virtual/como-acessar.html \
                  formacoes/assistencia-virtual/index.html
          git commit -m "Atualiza vagas automaticamente"
          git pull --rebase origin main
          git push origin HEAD:main
